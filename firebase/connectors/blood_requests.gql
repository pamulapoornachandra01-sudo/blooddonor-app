# Blood Request Queries
query GetBloodRequest($id: UUID!) {
  bloodRequest(id: $id) {
    id
    receiverId
    receiverName
    bloodType
    unitsNeeded
    location
    locationDetails
    urgency
    medicalProofUrl
    status
    createdAt
    fulfilledAt
    pledgedDonors
    hospitalName
    contactPhone
  }
}

query ListBloodRequests {
  bloodRequests(orderBy: { createdAt: DESC }) {
    id
    receiverId
    receiverName
    bloodType
    unitsNeeded
    location
    locationDetails
    urgency
    medicalProofUrl
    status
    createdAt
    fulfilledAt
    pledgedDonors
    hospitalName
    contactPhone
  }
}

query ListBloodRequestsByReceiver($receiverId: UUID!) {
  bloodRequests(where: { receiverId: { eq: $receiverId } }, orderBy: { createdAt: DESC }) {
    id
    receiverId
    receiverName
    bloodType
    unitsNeeded
    location
    locationDetails
    urgency
    medicalProofUrl
    status
    createdAt
    fulfilledAt
    pledgedDonors
    hospitalName
    contactPhone
  }
}

