# Blood Request Mutations
mutation CreateBloodRequest(
  $receiverId: UUID!,
  $receiverName: String!,
  $bloodType: String!,
  $unitsNeeded: Int!,
  $location: String!,
  $locationDetails: String,
  $urgency: String!,
  $medicalProofUrl: String,
  $hospitalName: String,
  $contactPhone: String
) {
  createBloodRequest(data: {
    receiverId: $receiverId,
    receiverName: $receiverName,
    bloodType: $bloodType,
    unitsNeeded: $unitsNeeded,
    location: $location,
    locationDetails: $locationDetails,
    urgency: $urgency,
    medicalProofUrl: $medicalProofUrl,
    hospitalName: $hospitalName,
    contactPhone: $contactPhone,
    status: "posted"
  }) {
    id
    receiverId
    bloodType
    unitsNeeded
    status
    createdAt
  }
}

mutation UpdateBloodRequest(
  $id: UUID!,
  $status: String,
  $pledgedDonors: [String],
  $fulfilledAt: Timestamp
) {
  updateBloodRequest(id: $id, data: {
    status: $status,
    pledgedDonors: $pledgedDonors,
    fulfilledAt: $fulfilledAt
  }) {
    id
    status
    pledgedDonors
    fulfilledAt
  }
}

mutation PledgeDonor($id: UUID!, $donorId: String!) {
  bloodRequest(id: $id) {
    pledgedDonors
  }
}

mutation DeleteBloodRequest($id: UUID!) {
  deleteBloodRequest(id: $id)
}
