name: blood_donate
description: "Blood Donation MVP App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  
  # Navigation
  go_router: ^13.2.0
  
  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2
  
  # Storage
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  
  # Functional Programming
  fpdart: ^1.1.0
  
  # Animations
  lottie: ^3.1.0
  shimmer: ^3.0.0
  animations: ^2.0.11
  
  # Camera & Images
  camera: ^0.10.5+9
  image_picker: ^1.1.1
  image_cropper: ^8.0.2
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  
  # Permissions
  permission_handler: ^11.3.0
  
  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  
  # Utils
  logger: ^2.3.0
  equatable: ^2.0.5
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/animations/
    - assets/images/
